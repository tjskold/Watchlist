<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Watchlist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f5f2;
    color: #1a1a1a;
    padding-bottom: 80px;
  }

  header {
    background: #fff;
    border-bottom: 2px solid #e0d8ce;
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }

  input[type="search"], input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    background: #f7f5f2;
    color: #1a1a1a;
    outline: none;
    display: block;
    font-family: inherit;
  }
  input[type="search"] { margin-bottom: 10px; }
  input:focus, select:focus { border-color: #8b5e2a; }

  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    margin-bottom: 10px;
    padding-bottom: 2px;
  }
  .tab {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid #ddd;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    color: #666;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tab.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }

  .filter-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .fbtn {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid #ddd;
    background: #fff;
    font-size: 12px;
    color: #666;
    cursor: pointer;
  }
  .fbtn.active { background: #8b5e2a; border-color: #8b5e2a; color: #fff; }
  .stats { font-size: 12px; color: #999; margin-left: auto; }

  .sort-row { display: flex; align-items: center; gap: 8px; }
  .sort-label { font-size: 12px; color: #999; white-space: nowrap; }
  #sort-select {
    flex: 1;
    padding: 6px 10px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 13px;
    background: #f7f5f2;
    color: #1a1a1a;
    outline: none;
    cursor: pointer;
  }
  #sort-select:focus { border-color: #8b5e2a; }

  /* List */
  .list { padding: 12px 16px; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 10px;
  }

  /* Film Card */
  .card {
    background: #fff;
    border: 1.5px solid #e8e2da;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  .card.seen { background: #f5f3f0; border-color: #e0dbd4; opacity: 0.55; }
  .card-top { display: flex; align-items: flex-start; gap: 12px; }
  .info { flex: 1; min-width: 0; }
  .title-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 3px; }
  .title { font-size: 16px; font-weight: 600; color: #1a1a1a; line-height: 1.3; }
  .card.seen .title { text-decoration: line-through; color: #aaa; }
  .arrow { font-size: 10px; color: #ccc; transition: transform 0.2s; flex-shrink: 0; margin-top: 2px; }
  .card.open .arrow { transform: rotate(180deg); }
  .director { font-size: 13px; color: #777; margin-bottom: 6px; }
  .card.seen .director { color: #bbb; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #f0ece6; color: #888; border: 1px solid #e8e2da; }
  .tag.yr { background: #fdf6ec; color: #8b5e2a; border-color: #f0d9b5; }
  .tag.nt { background: #eef7f3; color: #2e7a5e; border-color: #b5dfd0; }
  .card.seen .tag { opacity: 0.4; }

  .circle {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid #ddd; background: #fff;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.15s;
  }
  .card:not(.seen) .circle:hover { border-color: #8b5e2a; }
  .card.seen .circle { background: #2e7a5e; border-color: #2e7a5e; }
  .tick { display: none; width: 14px; height: 14px; stroke: #fff; stroke-width: 2.5; fill: none; }
  .card.seen .tick { display: block; }

  .card-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0ece6; }
  .card.open .card-detail { display: block; }
  .drow { display: flex; gap: 8px; margin-bottom: 7px; font-size: 13px; line-height: 1.45; align-items: baseline; }
  .dlabel { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #bbb; min-width: 54px; flex-shrink: 0; padding-top: 2px; }
  .dval { color: #444; }

  .rt-row { display: flex; gap: 8px; margin-bottom: 7px; align-items: center; }
  .rt-score {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 600;
    padding: 3px 10px 3px 7px; border-radius: 20px;
    border: 1.5px solid #e8e2da; background: #f7f5f2; color: #555;
    transition: all 0.2s;
  }
  .rt-score.fresh { background: #fff3f0; border-color: #ffb8a8; color: #c0392b; }
  .rt-score.rotten { background: #f5f3f0; border-color: #ddd; color: #888; }
  .rt-score.loading { color: #bbb; border-color: #eee; font-style: italic; font-weight: 400; }
  .rt-tomato { font-size: 14px; line-height: 1; }

  .action-row { display: flex; gap: 8px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  .seen-btn {
    padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #2e7a5e; color: #2e7a5e; background: #eef7f3;
  }
  .card.seen .seen-btn { border-color: #ddd; color: #aaa; background: #f5f3f0; }
  .edit-btn {
    padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #d0c4b4; color: #8b5e2a; background: #fdf6ec;
  }
  .edit-btn:hover { background: #f5e8d0; border-color: #c0a882; }
  .delete-btn {
    padding: 7px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #f0d0d0; color: #c44; background: #fff8f8;
    margin-left: auto;
  }
  .delete-btn:hover { background: #ffe8e8; border-color: #e0a0a0; }

  /* Director cards */
  .dcard {
    background: #fff;
    border: 1.5px solid #e8e2da;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .dcard-top { display: flex; align-items: flex-start; gap: 8px; }
  .dcard-info { flex: 1; }
  .dname { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
  .dcountry { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #8b5e2a; margin-bottom: 4px; }
  .dstyle { font-size: 11px; color: #aaa; }
  .dcard-arrow { font-size: 10px; color: #ccc; transition: transform 0.2s; margin-top: 4px; flex-shrink: 0; }
  .dcard.open .dcard-arrow { transform: rotate(180deg); }

  .dcard-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0ece6; }
  .dcard.open .dcard-detail { display: block; }

  .dcard-films-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #bbb; margin-bottom: 8px; }

  .film-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    margin: 3px 4px 3px 0;
    border: 1.5px solid #e8e2da;
    background: #f7f5f2;
    color: #333;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .film-pill:hover { background: #f0ece6; border-color: #d0c8bc; }
  .film-pill.in-list { background: #eef7f3; border-color: #b5dfd0; color: #2e7a5e; }
  .film-pill.in-list.is-seen { background: #f0f0f0; border-color: #ddd; color: #aaa; text-decoration: line-through; }
  .film-pill.not-in-list { background: #fdf6ec; border-color: #f0d9b5; color: #8b5e2a; }
  .pill-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  .dcard-note { font-size: 12px; color: #999; margin-top: 10px; font-style: italic; }

  /* Floating add button */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: #1a1a1a;
    color: #fff;
    font-size: 26px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    z-index: 20;
    transition: background 0.15s, transform 0.15s;
  }
  .fab:hover { background: #333; transform: scale(1.08); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 30;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 18px 18px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-close {
    font-size: 22px;
    cursor: pointer;
    color: #aaa;
    background: none;
    border: none;
    line-height: 1;
    padding: 0 4px;
  }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }

  .modal-submit {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    background: #1a1a1a;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    margin-top: 6px;
  }
  .modal-submit:hover { background: #333; }

  .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px; }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a1a;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 50;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>🎬 My Watchlist</h1>
  <input type="search" id="search" placeholder="Search title, director, actor…">
  <div class="tabs">
    <button class="tab active" data-tab="films">Films</button>
    <button class="tab" data-tab="svenska">🇸🇪 Svenska</button>
    <button class="tab" data-tab="tv">TV & Docs</button>
    <button class="tab" data-tab="directors">Directors</button>
  </div>
  <div class="filter-row" id="frow">
    <button class="fbtn active" data-f="all">All</button>
    <button class="fbtn" data-f="unseen">Unseen</button>
    <button class="fbtn" data-f="seen">Seen</button>
    <span class="stats" id="stats"></span>
  </div>
  <div class="sort-row" id="srow">
    <span class="sort-label">Sort:</span>
    <select id="sort-select">
      <option value="default">Default</option>
      <option value="title">Title A–Z</option>
      <option value="year-asc">Year ↑</option>
      <option value="year-desc">Year ↓</option>
      <option value="genre">Genre A–Z</option>
      <option value="director">Director A–Z</option>
      <option value="rt-desc">RT Score ↓</option>
      <option value="seen-first">Seen first</option>
      <option value="unseen-first">Unseen first</option>
      <option value="added-desc">Recently added</option>
      <option value="shuffle">🔀 Shuffle</option>
    </select>
  </div>
</header>

<div class="list" id="list"></div>

<!-- Floating add button -->
<button class="fab" id="fab" title="Add film">＋</button>

<!-- Add modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">
      Add to Watchlist
      <button class="modal-close" id="modal-close">✕</button>
    </div>

    <!-- Film fields -->
    <div id="film-fields">
      <div class="field">
        <label>Title *</label>
        <input type="text" id="f-title" placeholder="e.g. Parasite">
      </div>
      <div class="field">
        <label>Director</label>
        <input type="text" id="f-director" placeholder="e.g. Bong Joon-ho">
      </div>
      <div class="field">
        <label>Actors</label>
        <input type="text" id="f-actors" placeholder="e.g. Song Kang-ho, Choi Woo-shik">
      </div>
      <div class="field">
        <label>Genre</label>
        <input type="text" id="f-genre" placeholder="e.g. Thriller / Drama">
      </div>
      <div class="field">
        <label>Year</label>
        <input type="text" id="f-year" placeholder="e.g. 2019">
      </div>
      <div class="field">
        <label>Add to list</label>
        <select id="f-list">
          <option value="films">Films</option>
          <option value="svenska">Svenska</option>
          <option value="tv">TV &amp; Docs</option>
        </select>
      </div>
      <div class="field">
        <label>Notes (optional)</label>
        <input type="text" id="f-note" placeholder="e.g. For AA, Russian, etc.">
      </div>
    </div>

    <!-- Director fields -->
    <div id="director-fields" style="display:none">
      <div class="field">
        <label>Name *</label>
        <input type="text" id="d-name" placeholder="e.g. Park Chan-wook">
      </div>
      <div class="field">
        <label>Country</label>
        <input type="text" id="d-country" placeholder="e.g. South Korea">
      </div>
      <div class="field">
        <label>Notable Films</label>
        <input type="text" id="d-films" placeholder="e.g. Oldboy, The Handmaiden, Stoker">
      </div>
      <div class="field">
        <label>Style / Genre</label>
        <input type="text" id="d-style" placeholder="e.g. Thriller / Drama">
      </div>
    </div>

    <button class="modal-submit" id="modal-submit">Add</button>
  </div>
</div>

<div class="toast" id="toast"></div>

var seen = {}, customItems = {films:[], svenska:[], tv:[]}, customDirectors = [], deleted = {}, deletedDirs = [];
try {
  seen = JSON.parse(localStorage.getItem('wl4_seen') || '{}');
  customItems = JSON.parse(localStorage.getItem('wl4_custom') || '{"films":[],"svenska":[],"tv":[]}');
  customDirectors = JSON.parse(localStorage.getItem('wl4_dirs') || '[]');
  deleted = JSON.parse(localStorage.getItem('wl4_deleted') || '{}');
  deletedDirs = JSON.parse(localStorage.getItem('wl4_deldirs') || '[]');
} catch(e) {}

var tab = 'films', filter = 'all', q = '', sort = 'default';

function save() {
  try {
    localStorage.setItem('wl4_seen', JSON.stringify(seen));
    localStorage.setItem('wl4_custom', JSON.stringify(customItems));
    localStorage.setItem('wl4_dirs', JSON.stringify(customDirectors));
    localStorage.setItem('wl4_deleted', JSON.stringify(deleted));
    localStorage.setItem('wl4_deldirs', JSON.stringify(deletedDirs));
  } catch(e) {}
}

function getItems(tb) {
  var base = tb === 'films' ? BASE_FILMS : tb === 'svenska' ? BASE_SVENSKA : BASE_TV;
  var del = deleted[tb] || [];
  return base.filter(function(i) { return del.indexOf(i.t) === -1; }).concat(customItems[tb] || []);
}

function k(tb, title) { return tb + '::' + title; }

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  var listEl = document.getElementById('list');
  listEl.innerHTML = '';
  var frow = document.getElementById('frow');

  // ── Directors tab ──────────────────────────────────────────────────────
  if (tab === 'directors') {
    frow.style.display = 'none';
    document.getElementById('srow').style.display = 'none';
  

    var allDirs = DIRECTORS.filter(function(d) { return deletedDirs.indexOf(d.name) === -1; }).concat(customDirectors);
    var lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = allDirs.length + ' directors — tap to explore films';
    listEl.appendChild(lbl);

    allDirs.forEach(function(dir) {
      var isCustom = customDirectors.some(function(d) { return d.name === dir.name; });
      var card = document.createElement('div');
      card.className = 'dcard';

      // Build film pills — check across all lists
      var pillsHtml = dir.films.map(function(filmTitle) {
        var found = null, foundTab = null;
        ['films','svenska','tv'].forEach(function(tb2) {
          getItems(tb2).forEach(function(item) {
            if (item.t.toLowerCase() === filmTitle.toLowerCase()) {
              found = item; foundTab = tb2;
            }
          });
        });
        var isSeen = found ? !!seen[k(foundTab, found.t)] : false;
        var cls = found ? (isSeen ? 'film-pill in-list is-seen' : 'film-pill in-list') : 'film-pill not-in-list';
        var dot = found ? '<span class="pill-dot"></span>' : '';
        return '<span class="film-pill '+cls+'" data-film="'+encodeURIComponent(filmTitle)+'" data-tab="'+(foundTab||'')+'">'+ dot + filmTitle +'</span>';
      }).join('');

      card.innerHTML =
        '<div class="dcard-top">' +
          '<div class="dcard-info">' +
            '<div class="dname">'+dir.name+'</div>' +
            '<div class="dcountry">'+dir.country+'</div>' +
            '<div class="dstyle">'+dir.style+'</div>' +
          '</div>' +
          '<span class="dcard-arrow">▼</span>' +
        '</div>' +
        '<div class="dcard-detail">' +
          '<div class="dcard-films-label">Films</div>' +
          '<div>'+pillsHtml+'</div>' +
          '<div class="dcard-note">Green = on your watchlist &nbsp;·&nbsp; Gold = not added yet</div>' +
          '<div class="action-row" style="margin-top:12px">' +
            '<button class="edit-btn">Edit</button>' +
            '<button class="delete-btn">Delete</button>' +
          '</div>' +
        '</div>';

      // Expand/collapse
      card.querySelector('.dcard-top').addEventListener('click', function() {
        card.classList.toggle('open');
      });

      // Edit director
      card.querySelector('.edit-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        openEditDirModal(dir, isCustom);
      });

      // Delete director
      card.querySelector('.delete-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        if (!confirm('Delete "' + dir.name + '" from directors?')) return;
        if (isCustom) {
          customDirectors = customDirectors.filter(function(d) { return d.name !== dir.name; });
        } else {
          deletedDirs.push(dir.name);
        }
        save();
        showToast('Deleted "' + dir.name + '"');
        render();
      });

      // Film pill clicks
      card.querySelectorAll('.film-pill').forEach(function(pill) {
        pill.addEventListener('click', function(e) {
          e.stopPropagation();
          var filmTitle = decodeURIComponent(pill.dataset.film);
          var targetTab = pill.dataset.tab;

          if (targetTab) {
            // Switch to that tab and open the card
            switchTab(targetTab);
            setTimeout(function() {
              var cards = document.querySelectorAll('.card');
              cards.forEach(function(c) {
                if (c.querySelector('.title') && c.querySelector('.title').textContent === filmTitle) {
                  c.classList.add('open');
                  c.scrollIntoView({behavior:'smooth', block:'center'});
                  c.style.outline = '2px solid #8b5e2a';
                  setTimeout(function() { c.style.outline = ''; }, 1800);
                }
              });
            }, 80);
          } else {
            // Not in list — offer to add
            openModal(filmTitle);
          }
        });
      });

      listEl.appendChild(card);
    });
    return;
  }

  // ── Film/TV tabs ───────────────────────────────────────────────────────
  frow.style.display = 'flex';
  document.getElementById('srow').style.display = 'flex';
  document.getElementById('fab').style.display = 'flex';

  var items = getItems(tab);
  var sq = q.toLowerCase();

  var visible = items.filter(function(item) {
    var sk = k(tab, item.t);
    var isSeen = !!seen[sk];
    if (filter === 'seen' && !isSeen) return false;
    if (filter === 'unseen' && isSeen) return false;
    if (sq && !(item.t.toLowerCase().indexOf(sq) >= 0 ||
                item.d.toLowerCase().indexOf(sq) >= 0 ||
                (item.a||'').toLowerCase().indexOf(sq) >= 0)) return false;
    return true;
  });

  // ── Sort ────────────────────────────────────────────────────────────────
  function rtVal(title) {
    var sc = RT_SCORES[title];
    if (!sc || sc.tomatometer === 'N/A') return -1;
    return parseInt(sc.tomatometer) || -1;
  }
  function yearVal(y) {
    if (!y || y === 'TBC') return 0;
    return parseInt(String(y).replace(/[^0-9]/g,'').slice(0,4)) || 0;
  }

  if (sort === 'title') {
    visible.sort(function(a,b){ return a.t.localeCompare(b.t); });
  } else if (sort === 'year-asc') {
    visible.sort(function(a,b){ return yearVal(a.y) - yearVal(b.y); });
  } else if (sort === 'year-desc') {
    visible.sort(function(a,b){ return yearVal(b.y) - yearVal(a.y); });
  } else if (sort === 'genre') {
    visible.sort(function(a,b){ return a.g.localeCompare(b.g); });
  } else if (sort === 'director') {
    visible.sort(function(a,b){ return a.d.localeCompare(b.d); });
  } else if (sort === 'rt-desc') {
    visible.sort(function(a,b){ return rtVal(b.t) - rtVal(a.t); });
  } else if (sort === 'seen-first') {
    visible.sort(function(a,b){ return (seen[k(tab,b.t)]?1:0) - (seen[k(tab,a.t)]?1:0); });
  } else if (sort === 'unseen-first') {
    visible.sort(function(a,b){ return (seen[k(tab,a.t)]?1:0) - (seen[k(tab,b.t)]?1:0); });
  } else if (sort === 'added-desc') {
    visible.sort(function(a,b){ return (b.added||0) - (a.added||0); });
  } else if (sort === 'shuffle') {
    for (var i = visible.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = visible[i]; visible[i] = visible[j]; visible[j] = tmp;
    }
  }

  var seenCount = items.filter(function(i) { return !!seen[k(tab,i.t)]; }).length;
  document.getElementById('stats').textContent = seenCount + ' / ' + items.length + ' seen';

  if (visible.length === 0) {
    var em = document.createElement('div');
    em.className = 'empty';
    em.textContent = 'No results.';
    listEl.appendChild(em);
    return;
  }

  var lbl2 = document.createElement('div');
  lbl2.className = 'section-label';
  lbl2.textContent = visible.length + ' titles — tap for details';
  listEl.appendChild(lbl2);

  visible.forEach(function(item) {
    var sk = k(tab, item.t);
    var isSeen = !!seen[sk];
    var isCustom = (customItems[tab] || []).some(function(c) { return c.t === item.t; });

    var card = document.createElement('div');
    card.className = 'card' + (isSeen ? ' seen' : '');

    var tagsHtml = '';
    if (item.y !== 'TBC') tagsHtml += '<span class="tag yr">'+item.y+'</span>';
    tagsHtml += '<span class="tag">'+item.g+'</span>';
    if (item.n) tagsHtml += '<span class="tag nt">'+item.n+'</span>';

    card.innerHTML =
      '<div class="card-top">' +
        '<div class="info">' +
          '<div class="title-row"><span class="title">'+item.t+'</span><span class="arrow">▼</span></div>' +
          '<div class="director">'+item.d+'</div>' +
          '<div class="tags">'+tagsHtml+'</div>' +
        '</div>' +
        '<div class="circle"><svg class="tick" viewBox="0 0 14 14"><polyline points="2,7 5.5,10.5 12,3"/></svg></div>' +
      '</div>' +
      '<div class="card-detail">' +
        '<div class="drow"><span class="dlabel">Actors</span><span class="dval">'+(item.a||'—')+'</span></div>' +
        '<div class="drow"><span class="dlabel">Genre</span><span class="dval">'+item.g+'</span></div>' +
        '<div class="drow"><span class="dlabel">Year</span><span class="dval">'+item.y+'</span></div>' +
        (item.n ? '<div class="drow"><span class="dlabel">Note</span><span class="dval">'+item.n+'</span></div>' : '') +
        '<div class="rt-row"><span class="dlabel">Rotten<br>Tomatoes</span><span class="rt-score loading" id="rt-'+sk.replace(/[^a-z0-9]/gi,'-')+'">fetching…</span></div>' +
        '<div class="action-row">' +
          '<button class="seen-btn">'+(isSeen ? '✓ Seen — undo' : '+ Mark as seen')+'</button>' +
          '<button class="edit-btn">Edit</button>' +
          '<button class="delete-btn">Delete</button>' +
        '</div>' +
      '</div>';

    card.querySelector('.card-top').addEventListener('click', function(e) {
      if (e.target.closest('.circle')) return;
      card.classList.toggle('open');
      if (card.classList.contains('open')) {
        fetchRT(item.t, item.y, sk.replace(/[^a-z0-9]/gi,'-'));
      }
    });

    card.querySelector('.circle').addEventListener('click', function(e) {
      e.stopPropagation();
      toggleSeen(card, sk, items);
    });

    card.querySelector('.seen-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      toggleSeen(card, sk, items);
    });

    card.querySelector('.edit-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      openEditModal(item, tab);
    });

    card.querySelector('.delete-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      if (!confirm('Delete "' + item.t + '" from your list?')) return;
      // Remove from custom list if custom, otherwise add to deleted set
      if (isCustom) {
        customItems[tab] = (customItems[tab] || []).filter(function(c) { return c.t !== item.t; });
      } else {
        deleted[tab] = deleted[tab] || [];
        if (deleted[tab].indexOf(item.t) === -1) deleted[tab].push(item.t);
      }
      delete seen[sk];
      save();
      showToast('Deleted "' + item.t + '"');
      render();
    });

    listEl.appendChild(card);
  });
}

function fetchRT(title, year, elId) {
  var el = document.getElementById('rt-' + elId);
  if (!el) return;
  var cacheKey = title + '|' + year;
  var result = rtCache[cacheKey] || RT_SCORES[title] || {tomatometer:"N/A", status:"unknown"};
  if (!rtCache[cacheKey]) { rtCache[cacheKey] = result; saveRT(); }
  applyRT(el, result);
}

function applyRT(el, result) {
  if (!el) return;
  var score = result.tomatometer || 'N/A';
  var status = result.status || 'unknown';
  var emoji = status === 'fresh' ? '🍅' : status === 'rotten' ? '🦠' : '🎬';
  el.innerHTML = '<span class="rt-tomato">'+emoji+'</span> ' + score;
  el.classList.remove('loading');
  el.classList.remove('fresh','rotten');
  if (status === 'fresh') el.classList.add('fresh');
  else if (status === 'rotten') el.classList.add('rotten');
}

function toggleSeen(card, sk, items) {
  seen[sk] = !seen[sk];
  save();
  card.classList.toggle('seen', seen[sk]);
  var btn = card.querySelector('.seen-btn');
  if (btn) btn.textContent = seen[sk] ? '✓ Seen — undo' : '+ Mark as seen';
  var seenCount = items.filter(function(i) { return !!seen[k(tab,i.t)]; }).length;
  document.getElementById('stats').textContent = seenCount + ' / ' + items.length + ' seen';
}

function switchTab(targetTab) {
  document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('[data-tab="'+targetTab+'"]').classList.add('active');
  tab = targetTab;
  q = ''; document.getElementById('search').value = '';
  sort = 'default'; document.getElementById('sort-select').value = 'default';
  filter = 'all';
  document.querySelectorAll('.fbtn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('[data-f="all"]').classList.add('active');
  render();
}

// ── Modal ─────────────────────────────────────────────────────────────────
var modalMode = 'add'; // 'add' | 'edit'
var editTarget = null; // {type:'film'|'dir', item, tab, isCustom}

function openModal(prefillTitle) {
  modalMode = 'add';
  editTarget = null;
  var isDir = tab === 'directors';
  document.getElementById('modal-title').childNodes[0].textContent = isDir ? 'Add Director ' : 'Add to Watchlist ';
  document.getElementById('film-fields').style.display = isDir ? 'none' : 'block';
  document.getElementById('director-fields').style.display = isDir ? 'block' : 'none';
  document.getElementById('modal-submit').textContent = isDir ? 'Add Director' : 'Add Film';
  if (isDir) {
    document.getElementById('d-name').value = prefillTitle || '';
    document.getElementById('d-country').value = '';
    document.getElementById('d-films').value = '';
    document.getElementById('d-style').value = '';
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('d-name').focus();
  } else {
    document.getElementById('f-title').value = prefillTitle || '';
    document.getElementById('f-director').value = '';
    document.getElementById('f-actors').value = '';
    document.getElementById('f-genre').value = '';
    document.getElementById('f-year').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-list').value = tab !== 'directors' ? tab : 'films';
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('f-title').focus();
  }
}

function openEditModal(item, itemTab) {
  modalMode = 'edit';
  var isCustom = (customItems[itemTab] || []).some(function(c) { return c.t === item.t; });
  editTarget = {type:'film', item:item, tab:itemTab, isCustom:isCustom};
  document.getElementById('modal-title').childNodes[0].textContent = 'Edit Film ';
  document.getElementById('film-fields').style.display = 'block';
  document.getElementById('director-fields').style.display = 'none';
  document.getElementById('modal-submit').textContent = 'Save Changes';
  document.getElementById('f-title').value = item.t || '';
  document.getElementById('f-director').value = item.d || '';
  document.getElementById('f-actors').value = item.a || '';
  document.getElementById('f-genre').value = item.g || '';
  document.getElementById('f-year').value = item.y || '';
  document.getElementById('f-note').value = item.n || '';
  document.getElementById('f-list').value = itemTab;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-title').focus();
}

function openEditDirModal(dir, isCustom) {
  modalMode = 'edit';
  editTarget = {type:'dir', dir:dir, isCustom:isCustom};
  document.getElementById('modal-title').childNodes[0].textContent = 'Edit Director ';
  document.getElementById('film-fields').style.display = 'none';
  document.getElementById('director-fields').style.display = 'block';
  document.getElementById('modal-submit').textContent = 'Save Changes';
  document.getElementById('d-name').value = dir.name || '';
  document.getElementById('d-country').value = dir.country || '';
  document.getElementById('d-films').value = Array.isArray(dir.films) ? dir.films.join(', ') : dir.films || '';
  document.getElementById('d-style').value = dir.style || '';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('d-name').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalMode = 'add';
  editTarget = null;
}

document.getElementById('fab').addEventListener('click', function() { openModal(); });
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('modal-submit').addEventListener('click', function() {
  // ── Director add/edit ──────────────────────────────────────────────────
  if (tab === 'directors' && modalMode === 'add') {
    var name = document.getElementById('d-name').value.trim();
    if (!name) { document.getElementById('d-name').focus(); return; }
    customDirectors.push({
      name: name,
      country: document.getElementById('d-country').value.trim() || '—',
      films: document.getElementById('d-films').value.trim().split(',').map(function(s){ return s.trim(); }).filter(Boolean),
      style: document.getElementById('d-style').value.trim() || '—'
    });
    save(); closeModal(); showToast('Added "' + name + '"'); render();
    return;
  }

  if (modalMode === 'edit' && editTarget && editTarget.type === 'dir') {
    var newName = document.getElementById('d-name').value.trim();
    if (!newName) { document.getElementById('d-name').focus(); return; }
    var updated = {
      name: newName,
      country: document.getElementById('d-country').value.trim() || '—',
      films: document.getElementById('d-films').value.trim().split(',').map(function(s){ return s.trim(); }).filter(Boolean),
      style: document.getElementById('d-style').value.trim() || '—'
    };
    if (editTarget.isCustom) {
      customDirectors = customDirectors.map(function(d) { return d.name === editTarget.dir.name ? updated : d; });
    } else {
      // Move base director to custom with edits, mark original deleted
      deletedDirs.push(editTarget.dir.name);
      customDirectors.push(updated);
    }
    save(); closeModal(); showToast('Updated "' + newName + '"'); render();
    return;
  }

  // ── Film add/edit ──────────────────────────────────────────────────────
  if (modalMode === 'edit' && editTarget && editTarget.type === 'film') {
    var newTitle = document.getElementById('f-title').value.trim();
    if (!newTitle) { document.getElementById('f-title').focus(); return; }
    var newListKey = document.getElementById('f-list').value;
    var updatedItem = {
      t: newTitle,
      d: document.getElementById('f-director').value.trim() || 'Unknown',
      a: document.getElementById('f-actors').value.trim() || '—',
      g: document.getElementById('f-genre').value.trim() || '—',
      y: document.getElementById('f-year').value.trim() || 'TBC',
      n: document.getElementById('f-note').value.trim() || ''
    };
    var oldTab = editTarget.tab;
    var oldTitle = editTarget.item.t;
    var oldSk = k(oldTab, oldTitle);
    var wasSeen = !!seen[oldSk];
    if (editTarget.isCustom) {
      customItems[oldTab] = (customItems[oldTab] || []).filter(function(c) { return c.t !== oldTitle; });
      if (!customItems[newListKey]) customItems[newListKey] = [];
      customItems[newListKey].push(updatedItem);
    } else {
      // Mark base item deleted, add updated version to custom
      deleted[oldTab] = deleted[oldTab] || [];
      if (deleted[oldTab].indexOf(oldTitle) === -1) deleted[oldTab].push(oldTitle);
      if (!customItems[newListKey]) customItems[newListKey] = [];
      customItems[newListKey].push(updatedItem);
    }
    delete seen[oldSk];
    if (wasSeen) seen[k(newListKey, newTitle)] = true;
    save(); closeModal();
    showToast('Updated "' + newTitle + '"');
    switchTab(newListKey);
    return;
  }

  // ── Film add ──────────────────────────────────────────────────────────
  var title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  var listKey = document.getElementById('f-list').value;
  var newItem = {
    t: title,
    d: document.getElementById('f-director').value.trim() || 'Unknown',
    a: document.getElementById('f-actors').value.trim() || '—',
    g: document.getElementById('f-genre').value.trim() || '—',
    y: document.getElementById('f-year').value.trim() || 'TBC',
    n: document.getElementById('f-note').value.trim() || '',
    added: Date.now()
  };
  if (!customItems[listKey]) customItems[listKey] = [];
  customItems[listKey].push(newItem);
  save(); closeModal(); switchTab(listKey); showToast('Added "' + title + '"');
});

// ── Tab & filter & sort events ────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    tab = btn.dataset.tab;
    q = ''; document.getElementById('search').value = '';
    sort = 'default'; document.getElementById('sort-select').value = 'default';
    render();
  });
});

document.querySelectorAll('.fbtn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.fbtn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    filter = btn.dataset.f;
    render();
  });
});

document.getElementById('sort-select').addEventListener('change', function() {
  sort = this.value;
  render();
  // Re-randomise each time shuffle is picked
  if (sort === 'shuffle') this.value = 'shuffle';
});

document.getElementById('search').addEventListener('input', function(e) {
  q = e.target.value;
  render();
});

render();
